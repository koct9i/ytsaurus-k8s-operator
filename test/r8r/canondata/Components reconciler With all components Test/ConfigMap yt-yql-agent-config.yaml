data:
  ytserver-yql-agent.yson: |-
    {
        "address_resolver"={
            "enable_ipv4"=%true;
            "enable_ipv6"=%false;
            retries=1000;
        };
        "solomon_exporter"={
            host="{POD_SHORT_HOSTNAME}";
            "instance_tags"={
                pod="{K8S_POD_NAME}";
            };
        };
        logging={
            writers={
                "info-stderr"={
                    type=stderr;
                    "file_name"="..";
                    "enable_compression"=%true;
                    "enable_system_messages"=%true;
                };
            };
            rules=[
                {
                    "min_level"=info;
                    writers=[
                        "info-stderr";
                    ];
                    family="plain_text";
                };
            ];
            "flush_period"=3000;
            "enable_anchor_profiling"=%true;
        };
        "monitoring_port"=10019;
        "rpc_port"=9019;
        "bus_server"={
            "encryption_mode"=required;
            "cert_chain"={
                "file_name"="/tls/bus_secret/tls.crt";
            };
            "private_key"={
                "file_name"="/tls/bus_secret/tls.key";
            };
            ca={
                "file_name"="/tls/ca_bundle/ca.crt";
            };
            "verification_mode"=full;
            "peer_alternative_host_name"="test-ytsaurus";
        };
        "timestamp_provider"={
            addresses=[
                "ms-0.masters.ytsaurus-components.svc.cluster.local:9010";
            ];
        };
        "cluster_connection"={
            "cluster_name"="test-ytsaurus";
            "primary_master"={
                addresses=[
                    "ms-0.masters.ytsaurus-components.svc.cluster.local:9010";
                ];
                peers=[
                    {
                        address="ms-0.masters.ytsaurus-components.svc.cluster.local:9010";
                        voting=%true;
                    };
                ];
                "cell_id"="65726e65-ad6b7562-10259-79747361";
            };
            "secondary_masters"=[
                {
                    addresses=[
                        "ms-2-0.masters-2.ytsaurus-components.svc.cluster.local:9010";
                    ];
                    peers=[
                        {
                            address="ms-2-0.masters-2.ytsaurus-components.svc.cluster.local:9010";
                            voting=%true;
                        };
                    ];
                    "cell_id"="65726e65-ad6b7562-20259-79747361";
                };
            ];
            "discovery_connection"={
                addresses=[
                    "ds-0.discovery.ytsaurus-components.svc.cluster.local:9020";
                ];
            };
            "bus_client"={
                "encryption_mode"=required;
                "cert_chain"={
                    "file_name"="/tls/bus_client_secret/tls.crt";
                };
                "private_key"={
                    "file_name"="/tls/bus_client_secret/tls.key";
                };
                ca={
                    "file_name"="/tls/ca_bundle/ca.crt";
                };
                "verification_mode"=full;
                "peer_alternative_host_name"="test-ytsaurus";
            };
            "master_cache"={
                addresses=[
                    "msc-0.master-caches.ytsaurus-components.svc.cluster.local:9018";
                ];
                "cell_id"="65726e65-ad6b7562-10259-79747361";
                "enable_master_cache_discovery"=%false;
            };
        };
        "cypress_annotations"={
            "k8s_node_name"="{K8S_NODE_NAME}";
            "k8s_pod_name"="{K8S_POD_NAME}";
            "k8s_pod_namespace"="{K8S_POD_NAMESPACE}";
            "physical_host"="{K8S_NODE_NAME}";
        };
        user="yql_agent";
        "yql_agent"={
            "gateway_config"={
                "mr_job_bin"="/usr/bin/mrjob";
                "mr_job_udfs_dir"="/usr/lib/yql";
                "cluster_mapping"=[
                    {
                        name="test-ytsaurus";
                        cluster="https://http-proxies.ytsaurus-components.svc.cluster.local";
                        default=%true;
                    };
                ];
            };
            "enable_dq"=%true;
            "dq_gateway_config"={
                "default_settings"=[
                    {
                        name=MemoryLimit;
                        value="1G";
                    };
                    {
                        name=ChannelBufferSize;
                        value="33554432";
                    };
                ];
            };
            "dq_manager_config"={
                "interconnect_port"=9035;
                "grpc_port"=9036;
                "use_ipv4"=%false;
                "yt_backends"=[
                    {
                        "cluster_name"="http-proxies-lb.ytsaurus-components.svc.cluster.local";
                        "jobs_per_operation"=1;
                        "max_jobs"=1;
                        "vanilla_job_lite"="/usr/bin/dq_vanilla_job.lite";
                        "vanilla_job_file"=[
                            {
                                name="dq_vanilla_job";
                                "local_path"="/usr/bin/dq_vanilla_job";
                            };
                        ];
                        "upload_replication_factor"=1;
                        "token_file"="/var/run/secrets/yql-agent-exec-secret/token";
                        user="yql_agent_exec";
                        "cpu_limit"=1;
                        "worker_capacity"=128;
                        "memory_limit"=2147483648;
                        "cache_size"=4294967296;
                        "use_tmp_fs"=%false;
                    };
                ];
                "yt_coordinator"={
                    "cluster_name"="http-proxies-lb.ytsaurus-components.svc.cluster.local";
                    "token_file"="/var/run/secrets/yql-agent-secret/token";
                    user="yql_agent";
                };
            };
            "yt_token_path"="/var/run/secrets/yql-agent-secret/token";
            "yql_plugin_shared_library"="/usr/lib/yql/libyqlplugin.so";
            "additional_system_libs"=[
                {
                    file="/usr/lib/yql/libiconv.so";
                };
                {
                    file="/usr/lib/yql/liblibidn-dynamic.so";
                };
            ];
            "mr_job_binary"="/usr/bin/mrjob";
            "udf_directory"="/usr/lib/yql";
            "additional_clusters"={
                "test-ytsaurus"="https://http-proxies.ytsaurus-components.svc.cluster.local";
            };
            "default_cluster"="test-ytsaurus";
        };
    }
metadata:
  annotations:
    extra-pod-annotation: "true"
    ytsaurus.tech/config-hash: <censored>
    ytsaurus.tech/config-overrides-version: "1"
    ytsaurus.tech/observed-generation: "1"
  generation: 1
  labels:
    app.kubernetes.io/component: yt-yql-agent
    app.kubernetes.io/managed-by: ytsaurus-k8s-operator
    app.kubernetes.io/name: yt-yql-agent
    app.kubernetes.io/part-of: yt-test-ytsaurus
    yt_component: test-ytsaurus-yt-yql-agent
    ytsaurus.tech/cluster-name: test-ytsaurus
  name: yt-yql-agent-config
  namespace: ytsaurus-components
  ownerReferences:
  - apiVersion: cluster.ytsaurus.tech/v1
    blockOwnerDeletion: true
    controller: true
    kind: Ytsaurus
    name: test-ytsaurus
    uid: ""
  resourceVersion: "1"
