data:
  client.yson: |-
    {
        "address_resolver"={
            "enable_ipv4"=%true;
            "enable_ipv6"=%false;
            retries=1000;
        };
        logging={
            writers={
            };
            rules=[
            ];
        };
        driver={
            "api_version"=4;
            "default_rpc_proxy_address_type"="public_rpc";
            "cluster_name"="test-ytsaurus";
            "primary_master"={
                addresses=[
                    "ms-0.masters.ytsaurus-components.svc.cluster.local:9010";
                ];
                peers=[
                    {
                        address="ms-0.masters.ytsaurus-components.svc.cluster.local:9010";
                        voting=%true;
                    };
                ];
                "cell_id"="65726e65-ad6b7562-10259-79747361";
            };
            "secondary_masters"=[
                {
                    addresses=[
                        "ms-2-0.masters-2.ytsaurus-components.svc.cluster.local:9010";
                    ];
                    peers=[
                        {
                            address="ms-2-0.masters-2.ytsaurus-components.svc.cluster.local:9010";
                            voting=%true;
                        };
                    ];
                    "cell_id"="65726e65-ad6b7562-20259-79747361";
                };
            ];
            "discovery_connection"={
                addresses=[
                    "ds-0.discovery.ytsaurus-components.svc.cluster.local:9020";
                ];
            };
            "bus_client"={
                "encryption_mode"=required;
                "cert_chain"={
                    "file_name"="/tls/bus_client_secret/tls.crt";
                };
                "private_key"={
                    "file_name"="/tls/bus_client_secret/tls.key";
                };
                ca={
                    "file_name"="/tls/ca_bundle/ca.crt";
                };
                "verification_mode"=full;
                "peer_alternative_host_name"="test-ytsaurus";
            };
            "master_cache"={
                addresses=[
                    "msc-0.master-caches.ytsaurus-components.svc.cluster.local:9018";
                ];
                "cell_id"="65726e65-ad6b7562-10259-79747361";
                "enable_master_cache_discovery"=%false;
            };
        };
    }
  yql-agent-initialization.sh: |-
    #!/bin/bash
    # YTsaurus init job script generated by ytsaurus-k8s-operator

    set -eux -o pipefail

    export YT_DRIVER_CONFIG_PATH=/config/client.yson
    /usr/bin/yt create user --attributes '{name="yql_agent"}' --ignore-existing
    /usr/bin/yt create map_node '//sys/cypress_tokens/681aebf18d40db2dfb4a6cc03678492e3abc6d2a004f5312c53a6a2cfd0bdee8' --ignore-existing
    /usr/bin/yt set '//sys/cypress_tokens/681aebf18d40db2dfb4a6cc03678492e3abc6d2a004f5312c53a6a2cfd0bdee8/@user' 'yql_agent'
    /usr/bin/yt add-member yql_agent superusers || true
    while [ "$(/usr/bin/yt check-permission --format json yql_agent administer /)" != '{"action":"allow"}' ] ; do sleep 1 ; done
    /usr/bin/yt create user --attributes '{name="yql_agent_exec"}' --ignore-existing
    /usr/bin/yt create map_node '//sys/cypress_tokens/15930b4157092c4b204d525793a12838421eb855877ff25a2b0332c53aa2256b' --ignore-existing
    /usr/bin/yt set '//sys/cypress_tokens/15930b4157092c4b204d525793a12838421eb855877ff25a2b0332c53aa2256b/@user' 'yql_agent_exec'
    /usr/bin/yt create document //sys/yql_agent/config --attributes '{value={}}' --recursive --ignore-existing
    /usr/bin/yt set //sys/@cluster_connection/yql_agent '{stages={production={channel={disable_balancing_on_single_address=%false;addresses=["yqla-0.yql-agents.ytsaurus-components.svc.cluster.local:9019";]}}}}'
    /usr/bin/yt get //sys/@cluster_connection | /usr/bin/yt set //sys/clusters/test-ytsaurus
    /usr/bin/yt create map_node //sys/yql_agent/dq --ignore-existing
    /usr/bin/yt check-permission yql_agent_exec create //sys/yql_agent/dq | grep -q allow || /usr/bin/yt set //sys/yql_agent/dq/@acl/end '{action=allow;subjects=["yql_agent_exec";];permissions=[create;read;remove;write;];"inheritance_mode"="object_and_descendants";}'
    /usr/bin/yt check-permission yql_agent_exec use //sys/accounts/sys | grep -q allow || /usr/bin/yt set //sys/accounts/sys/@acl/end '{action=allow;subjects=["yql_agent_exec";];permissions=[use;];"inheritance_mode"="object_and_descendants";}'
  yql-agent-update.sh: |-
    #!/bin/bash
    # YTsaurus init job script generated by ytsaurus-k8s-operator

    set -eux -o pipefail

    export YT_DRIVER_CONFIG_PATH=/config/client.yson
    /usr/bin/yt create user --attributes '{name="yql_agent"}' --ignore-existing
    /usr/bin/yt create map_node '//sys/cypress_tokens/681aebf18d40db2dfb4a6cc03678492e3abc6d2a004f5312c53a6a2cfd0bdee8' --ignore-existing
    /usr/bin/yt set '//sys/cypress_tokens/681aebf18d40db2dfb4a6cc03678492e3abc6d2a004f5312c53a6a2cfd0bdee8/@user' 'yql_agent'
    /usr/bin/yt add-member yql_agent superusers || true
    while [ "$(/usr/bin/yt check-permission --format json yql_agent administer /)" != '{"action":"allow"}' ] ; do sleep 1 ; done
    /usr/bin/yt create user --attributes '{name="yql_agent_exec"}' --ignore-existing
    /usr/bin/yt create map_node '//sys/cypress_tokens/15930b4157092c4b204d525793a12838421eb855877ff25a2b0332c53aa2256b' --ignore-existing
    /usr/bin/yt set '//sys/cypress_tokens/15930b4157092c4b204d525793a12838421eb855877ff25a2b0332c53aa2256b/@user' 'yql_agent_exec'
    /usr/bin/yt set //sys/@cluster_connection/yql_agent/stages/production/channel/disable_balancing_on_single_address '%false'
    /usr/bin/yt create map_node //sys/yql_agent/dq --ignore-existing
    /usr/bin/yt check-permission yql_agent_exec create //sys/yql_agent/dq | grep -q allow || /usr/bin/yt set //sys/yql_agent/dq/@acl/end '{action=allow;subjects=["yql_agent_exec";];permissions=[create;read;remove;write;];"inheritance_mode"="object_and_descendants";}'
    /usr/bin/yt check-permission yql_agent_exec use //sys/accounts/sys | grep -q allow || /usr/bin/yt set //sys/accounts/sys/@acl/end '{action=allow;subjects=["yql_agent_exec";];permissions=[use;];"inheritance_mode"="object_and_descendants";}'
