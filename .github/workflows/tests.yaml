name: Tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
    paths-ignore:
      - '.github/**'
      - 'config/**'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      DEBUG:
        type: choice
        required: false
        default: ""
        options:
          - ""
          - "1"
          - "asan"
          - "msan"
          - "race"
      TEST_YTSAURUS_VERSION:
        description: "YTsaurus version or epoch"
        type: string
        required: false
        default: ""

jobs:
  gate:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-tests')
    steps:
      - run: echo "Run tests gate passed"

  check-unit:
    needs: gate
    name: Run unit tests
    uses: ./.github/workflows/subflow_run_unit_tests.yaml
    with:
      DEBUG: "${{ inputs.DEBUG }}"

  check-e2e:
    needs: gate
    name: Run e2e tests
    uses: ./.github/workflows/subflow_run_e2e_tests.yaml
    with:
      DEBUG: "${{ inputs.DEBUG }}"
      TEST_YTSAURUS_VERSION: "${{ inputs.TEST_YTSAURUS_VERSION }}"

  check-compat:
    needs: gate
    name: Run compat tests
    uses: ./.github/workflows/subflow_run_compat_tests.yaml
